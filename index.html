<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD Chat Ultra-Fast</title>
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #555555;
    --user-color: #39ff14; /* Verde Neon */
    --ai-color: #00e5ff;   /* Ciano */
    --listening: #ff3b3b;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none;
  }

  #wrap {
    display: flex; flex-direction: column; height: 100%; padding: 12px;
    justify-content: space-between;
  }

  #status-bar {
    font-size: 11px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 6px; padding-bottom: 6px;
    border-bottom: 1px solid #111; z-index: 10; background: var(--bg);
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .state-listening .dot { background: var(--listening); animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: var(--user-color); }

  #display-box {
    flex-grow: 1; display: flex; flex-direction: column;
    gap: 12px; padding: 10px 0; overflow-y: scroll;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #display-box::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 16px; line-height: 1.35; animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: rgba(57, 255, 20, 0.08);
    border: 1px solid var(--user-color);
    color: var(--user-color);
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: var(--ai-color); }

  #controls {
    font-size: 10px; color: var(--dim); text-align: center;
    border-top: 1px solid #111; padding-top: 6px; background: var(--bg);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-height: 360px) {
    .bubble { font-size: 14px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Sistema Ultra-Rapido Pronto. Parla pure in italiano, risolverò ambiguità (come i vari Ronaldo) all'istante.</div>
  </div>

  <div id="controls">
    <b>Doppio Pinch:</b> Parla • <b>Pinch Singolo:</b> Giù • <b>Pinch Lungo:</b> Su
  </div>
</div>

<script>
(() => {
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');

  let recognition;
  let isListening = false;
  let isThinking = false; 
  
  let chatHistory = []; 
  let requestQueue = []; 

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      updateStatusDisplay('ASCOLTO...');
    };

    recognition.onerror = () => resetStatus();
    recognition.onend = () => { isListening = false; };

    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      appendBubble('user', textSpoken);
      pushToQueue(textSpoken);
    };
  }

  function appendBubble(sender, text) {
    // Funzione per ripulire l'output da eventuali rimasugli di codice JSON del server
    let cleanText = text;
    if (text.includes('{"') || text.includes('role":') || text.includes('reasoning":')) {
      try {
        // Prova a estrarre solo la parte finale testuale se invia JSON sporchi
        const matches = text.match(/"content"\s*:\s*"([^"]+)"/);
        if (matches && matches[1]) {
          cleanText = matches[1];
        } else {
          cleanText = text.replace(/\{[^}]+\}/g, '').replace(/["']/g, '').trim();
        }
      } catch(e) {
        cleanText = "Ecco la risposta: elaborazione completata.";
      }
    }

    chatHistory.push({ sender: sender, text: cleanText });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? cleanText : `<strong>IA:</strong> ${cleanText}`;
    
    displayBox.appendChild(bubble);
    
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    // Prompt di sistema in italiano super direttivo per bloccare risposte in inglese o in formato codice
    const systemPrompt = "Sei un assistente per occhiali HUD. Rispondi SEMPRE in lingua italiana, in modo chiaro, naturale e senza usare formati JSON o parentesi graffe. Se l'utente chiede di 'Ronaldo' specifica brevemente che esistono sia il brasiliano (il Fenomeno) sia Cristiano Ronaldo, dando una risposta sintetica di massimo 2 frasi in italiano.";

    try {
      // Usiamo 'mistral-large' che è sensibilmente più veloce a elaborare le richieste web rispetto a gpt-4
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=mistral-large&system=${encodeURIComponent(systemPrompt)}`;

      const response = await fetch(url, { method: 'GET' });
      if (!response.ok) throw new Error('Errore');

      let reply = await response.text();
      
      appendBubble('ai', reply);
      
    } catch (error) {
      appendBubble('ai', 'Errore di connessione. Elaboro la prossima richiesta...');
    }

    // Passa alla prossima domanda con un delay ridotto a soli 200ms per la massima reattività
    setTimeout(processNextQueueItem, 200);
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  function scrollChatDown() { displayBox.scrollBy({ top: 100, behavior: 'smooth' }); }
  function scrollChatUp() { displayBox.scrollBy({ top: -100, behavior: 'smooth' }); }

  function toggleListening() {
    if (!recognition) return;
    if (isListening) recognition.stop(); else recognition.start();
  }

  let lastClickTime = 0;
  let longTimer = null;
  let isLongAction = false;
  const DOUBLE_DELAY = 280;
  const LONG_DELAY = 450;

  document.addEventListener('pointerdown', (e) => {
    isLongAction = false;
    clearTimeout(longTimer);
    longTimer = setTimeout(() => {
      isLongAction = true;
      scrollChatUp();
    }, LONG_DELAY);
  });

  document.addEventListener('pointerup', (e) => {
    clearTimeout(longTimer);
    if (isLongAction) return;

    const now = Date.now();
    if (now - lastClickTime < DOUBLE_DELAY) {
      lastClickTime = 0;
      toggleListening();
      if(e) e.preventDefault();
      return;
    }

    lastClickTime = now;
    setTimeout(() => {
      if (lastClickTime !== now) return;
      lastClickTime = 0;
      scrollChatDown();
    }, DOUBLE_DELAY);
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleListening(); }
    if (e.key === 'ArrowDown') { scrollChatDown(); }
    if (e.key === 'ArrowUp') { scrollChatUp(); }
  });

})();
</script>
</body>
</html>
