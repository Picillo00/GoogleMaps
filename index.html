<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Style Chat with Queue</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #555555;
    --user-color: #39ff14; /* Verde WhatsApp / Neon */
    --ai-color: #00e5ff;   /* Ciano */
    --listening: #ff3b3b;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none;
  }

  #wrap {
    display: flex; flex-direction: column; height: 100%; padding: 12px;
    justify-content: space-between;
  }

  /* Header fisso in alto */
  #status-bar {
    font-size: 11px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 6px; padding-bottom: 6px;
    border-bottom: 1px solid #111; z-index: 10; background: var(--bg);
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .state-listening .dot { background: var(--listening); animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: var(--user-color); }

  /* Area Chat: Lista verticale a scorrimento style WhatsApp */
  #display-box {
    flex-grow: 1; display: flex; flex-direction: column;
    gap: 12px; padding: 10px 0; overflow-y: scroll;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  /* Nasconde la barra di scorrimento per estetica HUD */
  #display-box::-webkit-scrollbar { display: none; }

  /* Bolle della Chat */
  .bubble {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 16px; line-height: 1.35; animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  /* Stile messaggio UTENTE (A destra, Verde) */
  .bubble.user {
    align-self: flex-end;
    background: rgba(57, 255, 20, 0.08);
    border: 1px solid var(--user-color);
    color: var(--user-color);
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  /* Stile messaggio IA (A sinistra, Bianco/Ciano) */
  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: var(--ai-color); }

  #controls {
    font-size: 10px; color: var(--dim); text-align: center;
    border-top: 1px solid #111; padding-top: 6px; background: var(--bg);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-height: 360px) {
    .bubble { font-size: 14px; padding: 8px 12px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Ciao! Cronologia attiva con coda intelligente. Fai doppio pinch per parlare, le richieste si accoderanno senza errori.</div>
  </div>

  <div id="controls">
    <b>Doppio Pinch:</b> Parla • <b>Pinch Singolo:</b> Giù • <b>Pinch Lungo:</b> Su • <b>Swipe DX:</b> Cancella
  </div>
</div>

<script>
(() => {
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');

  let recognition;
  let isListening = false;
  let isThinking = false; 
  
  let chatHistory = []; 
  let requestQueue = []; 

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      updateStatusDisplay('ASCOLTO...');
    };

    recognition.onerror = () => resetStatus();
    recognition.onend = () => { isListening = false; };

    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      appendBubble('user', textSpoken);
      pushToQueue(textSpoken);
    };
  }

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    
    displayBox.appendChild(bubble);
    
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    isThinking = true;
    
    updateStatusDisplay('ELABORAZIONE...');

    const apiMessages = [
      { 
        role: 'system', 
        content: 'Sei un assistente HUD per occhiali smart. Rispondi in italiano. Sii preciso al 100% sui dati storici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva (es. Paolo Maldini ha giocato solo nel Milan!). Rispondi in massimo due frasi cortissime senza fronzoli.' 
      }
    ];
    
    const recent = chatHistory.slice(-4);
    recent.forEach(msg => {
      apiMessages.push({
        role: msg.sender === 'user' ? 'user' : 'assistant',
        content: msg.text
      });
    });

    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(apiMessages[0].content)}`;

      const response = await fetch(url, { method: 'GET' });

      if (!response.ok) throw new Error('Errore di risposta');

      const reply = await response.text();
      appendBubble('ai', reply);
      
    } catch (error) {
      // Se l'errore è dovuto alla cancellazione manuale dell'utente, non mostriamo l'errore a schermo
      if (nextPrompt !== "__CANCELLED__") {
        appendBubble('ai', 'Errore temporaneo. Salto alla prossima richiesta...');
      }
    }

    // Delay di sicurezza di 500ms tra una richiesta e l'altra per non intasare l'IP
    setTimeout(processNextQueueItem, 500);
  }

  /* NUOVA FUNZIONE: Cancella l'ultima richiesta dell'utente */
  function removeLastUserRequest() {
    // 1. Controlla se c'è qualcosa nella coda in attesa
    if (requestQueue.length > 0) {
      requestQueue.pop(); // Rimuove l'ultimo elemento inserito nella coda
    } 
    
    // 2. Trova e rimuove l'ultima bolla visiva dell'utente nel DOM e nell'array chatHistory
    const userBubbles = displayBox.querySelectorAll('.bubble.user');
    if (userBubbles.length > 0) {
      const lastUserBubble = userBubbles[userBubbles.length - 1];
      lastUserBubble.remove(); // Elimina la bolla dalla schermata
      
      // Rimuove l'ultimo messaggio 'user' anche dalla cronologia logica
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].sender === 'user') {
          chatHistory.splice(i, 1);
          break;
        }
      }
    }
    
    resetStatus();
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  function scrollChatDown() { displayBox.scrollBy({ top: 100, behavior: 'smooth' }); }
  function scrollChatUp() { displayBox.scrollBy({ top: -100, behavior: 'smooth' }); }

  function toggleListening() {
    if (!recognition) return;
    if (isListening) recognition.stop(); else recognition.start();
  }

  let lastClickTime = 0;
  let longTimer = null;
  let isLongAction = false;
  const DOUBLE_DELAY = 280;
  const LONG_DELAY = 450;

  /* LOGICA DI SWIPE VERSO DESTRA */
  let touchStartX = 0;
  let touchStartY = 0;
  const SWIPE_THRESHOLD = 60; // Distanza minima in pixel per attivare lo swipe
  const SWIPE_RESTRAINT = 40; // Massimo scostamento verticale permesso durante lo swipe

  document.addEventListener('touchstart', (e) => {
    const touch = e.changedTouches[0];
    touchStartX = touch.pageX;
    touchStartY = touch.pageY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const touch = e.changedTouches[0];
    const distX = touch.pageX - touchStartX;
    const distY = touch.pageY - touchStartY;

    // Se si muove verso destra (distX > 0), supera la soglia e non è un movimento troppo verticale
    if (distX >= SWIPE_THRESHOLD && Math.abs(distY) <= SWIPE_RESTRAINT) {
      removeLastUserRequest();
      e.preventDefault();
      return;
    }
  }, { passive: false });


  document.addEventListener('pointerdown', (e) => {
    isLongAction = false;
    clearTimeout(longTimer);
    longTimer = setTimeout(() => {
      isLongAction = true;
      scrollChatUp();
    }, LONG_DELAY);
  });

  document.addEventListener('pointerup', (e) => {
    clearTimeout(longTimer);
    if (isLongAction) return;

    const now = Date.now();
    if (now - lastClickTime < DOUBLE_DELAY) {
      lastClickTime = 0;
      toggleListening();
      if(e) e.preventDefault();
      return;
    }

    lastClickTime = now;
    setTimeout(() => {
      if (lastClickTime !== now) return;
      lastClickTime = 0;
      scrollChatDown();
    }, DOUBLE_DELAY);
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleListening(); }
    if (e.key === 'ArrowDown') { scrollChatDown(); }
    if (e.key === 'ArrowUp') { scrollChatUp(); }
    if (e.key === 'Backspace' || e.key === 'Delete') { removeLastUserRequest(); } // Backspace come fallback da tastiera
  });

})();
</script>
</body>
</html>
