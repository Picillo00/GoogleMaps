<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Style Chat with Universal Mic Lock</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background-color: #020205;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .chat-container {
    background: #05050a;
    width: 100%;
    max-width: 360px;
    height: 85vh;
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
    border: 2px solid #0b0b14;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  #status-bar {
    font-size: 11px;
    font-weight: bold;
    color: #555555;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1a1a26;
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555555; }
  .state-listening .dot { background: #ff3b3b; animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: #00ffaa; }

  #display-box {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 14px 0;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #display-box::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.35;
    animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: rgba(0, 255, 170, 0.08);
    border: 1px solid #00ffaa;
    color: #00ffaa;
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: #00e5ff; }

  .buttons-menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 10px;
  }

  .menu-btn {
    border-radius: 16px;
    height: 55px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.1s ease;
    outline: none;
    box-sizing: border-box;
  }

  @keyframes pulse-focus {
    0% { box-shadow: inset 0 0 0 4px #00ffaa, 0 0 15px #00ffaa; }
    50% { box-shadow: inset 0 0 0 4px #ffff00, 0 0 20px #ffff00; }
    100% { box-shadow: inset 0 0 0 4px #00ffaa, 0 0 15px #00ffaa; }
  }

  .menu-btn:focus {
    animation: pulse-focus 0.6s infinite;
    z-index: 100;
  }

  #btn-talk {
    border: 1px solid #00ffaa;
    color: #00ffaa;
    background: rgba(0, 255, 170, 0.05);
  }

  #btn-rollout {
    border: 1px solid #ff0044;
    color: #ff0044;
    background: rgba(255, 0, 68, 0.05);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="chat-container">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Architettura Cloud Mic attiva. Apri questo indirizzo <strong>HTTPS</strong> sul telefono connesso alle Ray-Ban Meta per parlare liberamente dagli occhiali.</div>
  </div>

  <div class="buttons-menu">
    <button id="btn-talk" class="menu-btn" tabIndex="0">PARLA</button>
    <button id="btn-rollout" class="menu-btn" tabIndex="0">ROLLOUT</button>
  </div>
</div>

<script>
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');
  const btnTalk = document.getElementById('btn-talk');
  const btnRollout = document.getElementById('btn-rollout');

  let mediaRecorder;
  let audioChunks = [];
  let isListening = false;
  let isThinking = false; 
  let isTransitioning = false; 
  let lastTalkTriggerTime = 0; 
  let lastRollTriggerTime = 0; 
  
  let chatHistory = []; 
  let requestQueue = []; 

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    
    displayBox.appendChild(bubble);
    
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    if (nextPrompt === "__CANCELLED__") {
      setTimeout(processNextQueueItem, 50);
      return;
    }

    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    const apiMessages = [
      { 
        role: 'system', 
        content: 'Sei un assistente HUD per occhiali smart. Rispondi in italiano. Sii preciso al 100% sui dati storici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva. Rispondi in massimo due frasi cortissime senza fronzoli. Rispondi SEMPRE e SOLO con testo semplice in italiano. Non restituire MAI codice JSON, reasoning o tool_calls.' 
      }
    ];
    
    const recent = chatHistory.slice(-4);
    recent.forEach(msg => {
      apiMessages.push({
        role: msg.sender === 'user' ? 'user' : 'assistant',
        content: msg.text
      });
    });

    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(apiMessages[0].content)}`;
      const response = await fetch(url, { method: 'GET' });
      if (!response.ok) throw new Error('Errore di risposta');

      let reply = await response.text();
      reply = reply.trim();
      
      if (reply.startsWith('{') || reply.includes('"reasoning"')) {
         try {
             const jsonObj = JSON.parse(reply);
             if (jsonObj.content && jsonObj.content !== "") {
                 reply = jsonObj.content;
             } else {
                 throw new Error("Solo log interno o reasoning rilevato");
             }
         } catch (e) {
             reply = "Sto verificando i dati, puoi ripetere?";
         }
      }

      appendBubble('ai', reply);
    } catch (error) {
      appendBubble('ai', 'Ricerca in corso troppo complessa. Ripeti in modo più semplice.');
    }

    setTimeout(processNextQueueItem, 500);
  }

  function removeLastUserRequest() {
    if (requestQueue.length > 0) {
      requestQueue.pop(); 
    } 
    
    const userBubbles = displayBox.querySelectorAll('.bubble.user');
    if (userBubbles.length > 0) {
      const lastUserBubble = userBubbles[userBubbles.length - 1];
      lastUserBubble.remove();
      
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].sender === 'user') {
          chatHistory.splice(i, 1);
          break;
        }
      }
    }
    resetStatus();
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA') || stateText.includes('TRASCRIZIONE')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  // NUOVA LOGICA: Registrazione Audio Remota via Cloud per aggirare il blocco della WebView
  async function toggleListening() {
    if (isTransitioning) return;
    isTransitioning = true;

    if (isListening) {
      // Ferma la registrazione dell'hardware
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
    } else {
      updateStatusDisplay('INIZIALIZZAZIONE...');
      audioChunks = [];

      try {
        // Forza l'apertura del flusso audio catturando l'input principale (il Bluetooth delle stanghette Meta)
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          isListening = false;
          isTransitioning = false;
          updateStatusDisplay('TRASCRIZIONE...');

          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          
          // Chiude le tracce hardware per rilasciare l'alimentazione del microfono degli occhiali
          stream.getTracks().forEach(track => track.stop());

          // Spedisce il file audio grezzo direttamente al server Cloud Whisper per la conversione in testo
          await sendAudioToWhisper(audioBlob);
        };

        mediaRecorder.start();
        isListening = true;
        isTransitioning = false;
        updateStatusDisplay('ASCOLTO...');

      } catch (err) {
        console.error(err);
        updateStatusDisplay('ERRORE: CONTROLLA HTTPS O PERMESSI');
        isTransitioning = false;
        setTimeout(() => resetStatus(), 2500);
      }
    }
  }

  // Motore di trascrizione integrato con Pollinations AI (Modello Whisper Open Source)
  async function sendAudioToWhisper(blob) {
    try {
      const formData = new FormData();
      formData.append('file', blob, 'audio.wav');
      formData.append('model', 'whisper-large'); // Cambiato a modello Whisper cloud nativo

      const response = await fetch('https://audio.pollinations.ai/v1/audio/transcriptions', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) throw new Error("Server di trascrizione non raggiungibile");

      const data = await response.json();
      const textSpoken = data.text ? data.text.trim() : "";

      if (textSpoken.length > 1) {
        appendBubble('user', textSpoken);
        pushToQueue(textSpoken);
      } else {
        updateStatusDisplay('AUDIO NON RICONOSCIUTO');
        setTimeout(() => resetStatus(), 1500);
      }

    } catch (err) {
      updateStatusDisplay('ERRORE TRASCRIZIONE CLOUD');
      setTimeout(() => resetStatus(), 2000);
    }
  }

  function safeTriggerTalk(e) {
    if (e && e.cancelable) e.preventDefault();
    if (e && e.stopPropagation) e.stopPropagation();

    const now = Date.now();
    if (now - lastTalkTriggerTime < 800) return; 
    lastTalkTriggerTime = now;
    
    toggleListening();
  }

  function safeTriggerRollout(e) {
    if (e && e.cancelable) e.preventDefault();
    if (e && e.stopPropagation) e.stopPropagation();

    const now = Date.now();
    if (now - lastRollTriggerTime < 600) return;
    lastRollTriggerTime = now;
    
    removeLastUserRequest();
  }

  btnTalk.addEventListener('click', safeTriggerTalk);
  btnTalk.addEventListener('pointerup', safeTriggerTalk);
  btnTalk.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') safeTriggerTalk(e);
  });

  btnRollout.addEventListener('click', safeTriggerRollout);
  btnRollout.addEventListener('pointerup', safeTriggerRollout);
  btnRollout.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') safeTriggerRollout(e);
  });

  setTimeout(() => { 
    btnTalk.focus(); 
  }, 500);
</script>
</body>
</html>
