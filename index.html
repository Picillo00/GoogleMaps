<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Style Chat with Neural Lock</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background-color: #020205;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent; /* Evita flash blu su schermi touch */
  }

  .chat-container {
    background: #05050a;
    width: 100%;
    max-width: 360px;
    height: 85vh;
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
    border: 2px solid #0b0b14;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  #status-bar {
    font-size: 11px;
    font-weight: bold;
    color: #555555;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1a1a26;
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555555; }
  .state-listening .dot { background: #ff3b3b; animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: #00ffaa; }

  #display-box {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 14px 0;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #display-box::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.35;
    animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: rgba(0, 255, 170, 0.08);
    border: 1px solid #00ffaa;
    color: #00ffaa;
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: #00e5ff; }

  .buttons-menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 10px;
  }

  .menu-btn {
    border-radius: 16px;
    height: 55px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.1s ease;
    outline: none;
    box-sizing: border-box;
  }

  @keyframes pulse-focus {
    0% { box-shadow: inset 0 0 0 4px #00ffaa, 0 0 15px #00ffaa; }
    50% { box-shadow: inset 0 0 0 4px #ffff00, 0 0 20px #ffff00; }
    100% { box-shadow: inset 0 0 0 4px #00ffaa, 0 0 15px #00ffaa; }
  }

  .menu-btn:focus {
    animation: pulse-focus 0.6s infinite;
    z-index: 100;
  }

  #btn-talk {
    border: 1px solid #00ffaa;
    color: #00ffaa;
    background: rgba(0, 255, 170, 0.05);
  }

  #btn-rollout {
    border: 1px solid #ff0044;
    color: #ff0044;
    background: rgba(255, 0, 68, 0.05);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="chat-container">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Sistema allineato con l'architettura Hardware Lock. Fai il pinch o invia l'input dal bracciale per testare la risposta.</div>
  </div>

  <div class="buttons-menu">
    <button id="btn-talk" class="menu-btn" tabIndex="0">PARLA</button>
    <button id="btn-rollout" class="menu-btn" tabIndex="0">ROLLOUT</button>
  </div>
</div>

<script>
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');
  const btnTalk = document.getElementById('btn-talk');
  const btnRollout = document.getElementById('btn-rollout');

  let recognition;
  let isListening = false;
  let isThinking = false; 
  let isTransitioning = false; // NUOVO: Scudo atomico per evitare doppi inneschi hardware
  let lastTalkTriggerTime = 0; // Separato timer per microfono
  let lastRollTriggerTime = 0; // Separato timer per rollout
  
  let chatHistory = []; 
  let requestQueue = []; 

  // Inizializzazione controllata dell'API Speech Recognition
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      isTransitioning = false; // Sblocca solo quando l'hardware risponde davvero
      updateStatusDisplay('ASCOLTO...');
    };

    recognition.onerror = (event) => { 
      isListening = false;
      isTransitioning = false; // Sblocca in caso di errore
      updateStatusDisplay('ERRORE VOCE: ' + event.error);
      setTimeout(() => resetStatus(), 2000); // Ritorna visivamente allo stato pronto
    };

    recognition.onend = () => { 
      isListening = false; 
      isTransitioning = false; // Sblocca a fine registrazione
      if (requestQueue.length === 0 && !isThinking) resetStatus();
    };

    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      appendBubble('user', textSpoken);
      pushToQueue(textSpoken);
    };
  } else {
    setTimeout(() => { updateStatusDisplay('VOCE NON SUPPORTATA DA WEBVIEW'); }, 500);
  }

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    
    displayBox.appendChild(bubble);
    
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    if (nextPrompt === "__CANCELLED__") {
      setTimeout(processNextQueueItem, 50);
      return;
    }

    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    const apiMessages = [
      { 
        role: 'system', 
        content: 'Sei un assistente HUD per occhiali smart. Rispondi in italiano. Sii preciso al 100% sui dati storici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva. Rispondi in massimo due frasi cortissime senza fronzoli. Rispondi SEMPRE e SOLO con testo semplice in italiano. Non restituire MAI codice JSON, reasoning o tool_calls.' 
      }
    ];
    
    const recent = chatHistory.slice(-4);
    recent.forEach(msg => {
      apiMessages.push({
        role: msg.sender === 'user' ? 'user' : 'assistant',
        content: msg.text
      });
    });

    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(apiMessages[0].content)}`;
      const response = await fetch(url, { method: 'GET' });
      if (!response.ok) throw new Error('Errore di risposta');

      let reply = await response.text();
      reply = reply.trim();
      
      if (reply.startsWith('{') || reply.includes('"reasoning"')) {
         try {
             const jsonObj = JSON.parse(reply);
             if (jsonObj.content && jsonObj.content !== "") {
                 reply = jsonObj.content;
             } else {
                 throw new Error("Solo log interno o reasoning rilevato");
             }
         } catch (e) {
             reply = "Sto verificando i dati, puoi ripetere?";
         }
      }

      appendBubble('ai', reply);
    } catch (error) {
      appendBubble('ai', 'Ricerca in corso troppo complessa. Ripeti in modo più semplice.');
    }

    setTimeout(processNextQueueItem, 500);
  }

  function removeLastUserRequest() {
    if (requestQueue.length > 0) {
      requestQueue.pop(); 
    } 
    
    const userBubbles = displayBox.querySelectorAll('.bubble.user');
    if (userBubbles.length > 0) {
      const lastUserBubble = userBubbles[userBubbles.length - 1];
      lastUserBubble.remove();
      
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].sender === 'user') {
          chatHistory.splice(i, 1);
          break;
        }
      }
    }
    resetStatus();
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  async function toggleListening() {
    if (!recognition) {
      appendBubble('ai', 'Riconoscimento vocale non supportato sulla WebView.');
      return;
    }

    if (isTransitioning) return;
    isTransitioning = true; 

    if (isListening) {
      try {
        recognition.stop();
      } catch(e) {
        isTransitioning = false;
      }
    } else {
      updateStatusDisplay('INIZIALIZZAZIONE...');
      
      try {
        // FORZATURA HARDWARE: Chiede l'accesso al flusso audio grezzo per "svegliare" il microfono Meta
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          // Chiudiamo subito il flusso temporaneo, ci serviva solo a forzare il popup dei permessi
          stream.getTracks().forEach(track => track.stop());
        }
      } catch (mediaError) {
        console.log("Sveglia hardware fallita o rifiutata:", mediaError);
      }

      try {
        recognition.start();
        
        // Failsafe visivo se l'onstart non risponde
        setTimeout(() => { 
          if (isTransitioning && !isListening) {
            isTransitioning = false;
            updateStatusDisplay('ERRORE: PERMESSI O HTTPS MANCANTI');
            setTimeout(() => { resetStatus(); }, 2000);
          }
        }, 2500); 
        
      } catch(e) {
        updateStatusDisplay('ERRORE AVVIO: ' + e.message);
        isTransitioning = false;
      }
    }
  }

  // GESTORE SICURO: Previene i doppi tap, i click simulati dall'hardware e blocca il propagation
  function safeTriggerTalk(e) {
    if (e && e.cancelable) e.preventDefault();
    if (e && e.stopPropagation) e.stopPropagation();

    const now = Date.now();
    // Aumentato a 800ms per filtrare i rimbalzi dei segnali hardware Neural/Touch
    if (now - lastTalkTriggerTime < 800) return; 
    lastTalkTriggerTime = now;
    
    toggleListening();
  }

  function safeTriggerRollout(e) {
    if (e && e.cancelable) e.preventDefault();
    if (e && e.stopPropagation) e.stopPropagation();

    const now = Date.now();
    if (now - lastRollTriggerTime < 600) return;
    lastRollTriggerTime = now;
    
    removeLastUserRequest();
  }

  // Ascoltatori puliti: in ambiente mobile/webview è preferibile usare solo click o pointerup
  // per evitare che click e touchstart si attivino uno dopo l'altro.
  btnTalk.addEventListener('click', safeTriggerTalk);
  btnTalk.addEventListener('pointerup', safeTriggerTalk); // Cattura anche input neurali avanzati
  
  btnTalk.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') safeTriggerTalk(e);
  });

  btnRollout.addEventListener('click', safeTriggerRollout);
  btnRollout.addEventListener('pointerup', safeTriggerRollout);
  
  btnRollout.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') safeTriggerRollout(e);
  });

  // Aggancio iniziale del Focus ritardato per stabilizzare l'iniezione hardware del bracciale
  setTimeout(() => { 
    btnTalk.focus(); 
  }, 500);
</script>
</body>
</html>
