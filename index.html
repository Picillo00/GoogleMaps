<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Style Chat with Queue</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  :root {
    --bg: #000000;
    --text: #ffffff;
    --dim: #555555;
    --user-color: #39ff14; /* Verde WhatsApp / Neon */
    --ai-color: #00e5ff;   /* Ciano */
    --listening: #ff3b3b;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: manipulation;
  }

  #wrap {
    display: flex; flex-direction: column; height: 100%; padding: 12px;
    justify-content: space-between;
  }

  /* Header fisso in alto */
  #status-bar {
    font-size: 11px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
    display: flex; align-items: center; gap: 6px; padding-bottom: 6px;
    border-bottom: 1px solid #111; z-index: 10; background: var(--bg);
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .state-listening .dot { background: var(--listening); animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: var(--user-color); }

  /* Area Chat: Permette lo scorrimento verticale libero (Swipe alto/basso) */
  #display-box {
    flex-grow: 1; display: flex; flex-direction: column;
    gap: 12px; padding: 10px 0; overflow-y: auto;
    scroll-behavior: smooth;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
  }
  /* Nasconde la barra di scorrimento per estetica HUD */
  #display-box::-webkit-scrollbar { display: none; }

  /* Bolle della Chat */
  .bubble {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 16px; line-height: 1.35; animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  /* Stile messaggio UTENTE (A destra, Verde) */
  .bubble.user {
    align-self: flex-end;
    background: rgba(57, 255, 20, 0.08);
    border: 1px solid var(--user-color);
    color: var(--user-color);
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  /* Stile messaggio IA (A sinistra, Bianco/Ciano) */
  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: var(--ai-color); }

  /* NUOVO MENU HUD INFERIORE INTERATTIVO */
  #menu-bar {
    display: flex; gap: 10px; padding: 6px 0; background: var(--bg); z-index: 15;
  }
  .menu-btn {
    flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--dim); border-radius: 8px; color: var(--text);
    font-weight: bold; font-size: 14px; letter-spacing: 1px; cursor: pointer;
    text-align: center; transition: background 0.1s ease;
  }
  #btn-talk {
    border-color: var(--user-color); color: var(--user-color);
    background: rgba(57, 255, 20, 0.02);
  }
  #btn-talk:active { background: rgba(57, 255, 20, 0.15); }
  
  #btn-rollout {
    border-color: #ff3b3b; color: #ff3b3b;
    background: rgba(255, 59, 59, 0.02);
  }
  #btn-rollout:active { background: rgba(255, 59, 59, 0.15); }

  #controls {
    font-size: 10px; color: var(--dim); text-align: center;
    border-top: 1px solid #111; padding-top: 6px; background: var(--bg);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-height: 360px) {
    .bubble { font-size: 14px; padding: 8px 12px; }
    .menu-btn { padding: 8px; font-size: 12px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Ciao! Cronologia attiva con coda intelligente. Usa i pulsanti del menu in basso per interagire. Trascina la schermata verso l'alto o il basso per scorrere l'intera conversazione.</div>
  </div>

  <div id="menu-bar">
    <button id="btn-talk" class="menu-btn">PARLA</button>
    <button id="btn-rollout" class="menu-btn">ROLLOUT</button>
  </div>

  <div id="controls">
    <b>Menu HUD:</b> Clicca i pulsanti • <b>Scorrimento:</b> Swipe verticale sulla chat per leggere tutto
  </div>
</div>

<script>
(() => {
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');
  const btnTalk = document.getElementById('btn-talk');
  const btnRollout = document.getElementById('btn-rollout');

  let recognition;
  let isListening = false;
  let isThinking = false; 
  
  let chatHistory = []; 
  let requestQueue = []; 

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      updateStatusDisplay('ASCOLTO...');
    };

    recognition.onerror = () => resetStatus();
    recognition.onend = () => { isListening = false; };

    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      appendBubble('user', textSpoken);
      pushToQueue(textSpoken);
    };
  }

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    
    displayBox.appendChild(bubble);
    
    // Auto-scroll verso il basso solo alla ricezione di nuovi messaggi
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    
    if (nextPrompt === "__CANCELLED__") {
      setTimeout(processNextQueueItem, 50);
      return;
    }

    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    const apiMessages = [
      { 
        role: 'system', 
        content: 'Sei un assistente HUD per occhiali smart. Rispondi in italiano. Sii preciso al 100% sui dati storici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva (es. Paolo Maldini ha giocato solo nel Milan!). Rispondi in massimo due frasi cortissime senza fronzoli. Rispondi SEMPRE e SOLO con testo semplice in italiano. Non restituire MAI codice JSON, reasoning o tool_calls.' 
      }
    ];
    
    const recent = chatHistory.slice(-4);
    recent.forEach(msg => {
      apiMessages.push({
        role: msg.sender === 'user' ? 'user' : 'assistant',
        content: msg.text
      });
    });

    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(apiMessages[0].content)}`;

      const response = await fetch(url, { method: 'GET' });

      if (!response.ok) throw new Error('Errore di risposta');

      let reply = await response.text();
      reply = reply.trim();
      
      if (reply.startsWith('{') || reply.includes('"reasoning"')) {
         try {
             const jsonObj = JSON.parse(reply);
             if (jsonObj.content && jsonObj.content !== "") {
                 reply = jsonObj.content;
             } else {
                 throw new Error("Solo log interno o reasoning rilevato");
             }
         } catch (e) {
             reply = "Sto verificando i dati, puoi ripetere?";
         }
      }

      appendBubble('ai', reply);
      
    } catch (error) {
      appendBubble('ai', 'Ricerca in corso troppo complessa. Ripeti in modo più semplice.');
    }

    setTimeout(processNextQueueItem, 500);
  }

  function removeLastUserRequest() {
    if (requestQueue.length > 0) {
      requestQueue.pop(); 
    } 
    
    const userBubbles = displayBox.querySelectorAll('.bubble.user');
    if (userBubbles.length > 0) {
      const lastUserBubble = userBubbles[userBubbles.length - 1];
      lastUserBubble.remove();
      
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].sender === 'user') {
          chatHistory.splice(i, 1);
          break;
        }
      }
    }
    
    resetStatus();
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  function toggleListening() {
    if (!recognition) return;
    if (isListening) recognition.stop(); else recognition.start();
  }

  /* ATTIVAZIONE TRAMITE PULSANTI DEL MENU (OTTIMIZZATO PER BANDA NEURALE) */
  btnTalk.addEventListener('click', (e) => {
    e.preventDefault();
    toggleListening();
  });

  btnRollout.addEventListener('click', (e) => {
    e.preventDefault();
    removeLastUserRequest();
  });

  /* FUNZIONI DI SCORRIMENTO MANUALE DA TASTIERA PC */
  function scrollChatDown() { displayBox.scrollBy({ top: 100, behavior: 'smooth' }); }
  function scrollChatUp() { displayBox.scrollBy({ top: -100, behavior: 'smooth' }); }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === 'Enter') { e.preventDefault(); toggleListening(); }
    if (e.key === 'ArrowDown') { scrollChatDown(); }
    if (e.key === 'ArrowUp') { scrollChatUp(); }
    if (e.key === 'Backspace' || e.key === 'Delete') { removeLastUserRequest(); }
  });

})();
</script>
</body>
</html>
