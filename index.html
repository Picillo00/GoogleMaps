<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<meta name="theme-color" content="#000000">
<title>HUD WhatsApp Style Chat with Queue</title>
<link rel="icon" type="image/png" href="preview.png.jpg">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background-color: #0a0a0a;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }

  .chat-container {
    background: #141414;
    width: 100%;
    max-width: 360px;
    height: 85vh;
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  #status-bar {
    font-size: 11px;
    font-weight: bold;
    color: #555555;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 10px;
    border-bottom: 1px solid #222;
  }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555555; }
  .state-listening .dot { background: #ff3b3b; animation: pulse 1s infinite; }
  .state-thinking .dot { background: #f4b400; animation: pulse 1s infinite; }
  .state-ready .dot { background: #39ff14; }

  #display-box {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 14px 0;
    overflow-y: auto;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #display-box::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.35;
    animation: fadeIn 0.2s ease forwards;
    word-wrap: break-word;
  }

  .bubble.user {
    align-self: flex-end;
    background: rgba(57, 255, 20, 0.08);
    border: 1px solid #39ff14;
    color: #39ff14;
    border-bottom-right-radius: 4px;
    font-style: italic;
  }

  .bubble.ai {
    align-self: flex-start;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .bubble.ai strong { color: #00e5ff; }

  .buttons-menu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 10px;
  }

  /* STILE BOTTONI CON FOCUS EVIDENTE PER NEURAL BAND */
  button {
    border: 1px solid #555555;
    border-radius: 16px;
    height: 55px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    background-color: #262626;
    color: #ffffff;
    transition: all 0.15s ease;
  }

  button:active {
    transform: scale(0.95);
  }

  /* PARLA: Colore di base e variazione quando la banda ci si posiziona sopra (Focus) */
  #btn-talk {
    border-color: #39ff14;
    color: #39ff14;
    background: rgba(57, 255, 20, 0.03);
  }
  #btn-talk:hover, #btn-talk:focus {
    background-color: #39ff14;
    color: #000000;
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
  }

  /* ROLLOUT: Colore di base e variazione quando la banda ci si posiziona sopra (Focus) */
  #btn-rollout {
    border-color: #ff4a4a;
    color: #ff4a4a;
    background: rgba(58, 26, 26, 0.2);
  }
  #btn-rollout:hover, #btn-rollout:focus {
    background-color: #ff4a4a;
    color: #000000;
    box-shadow: 0 0 15px rgba(255, 74, 74, 0.6);
  }

  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="chat-container">
  <div id="status-bar" class="state-ready">
    <div class="dot"></div>
    <span id="status-text">PRONTO</span>
  </div>

  <div id="display-box">
    <div class="bubble ai"><strong>IA:</strong> Ciao! Ho aggiunto l'evidenziazione automatica. Quando la banda si sposta sui pulsanti, cambieranno colore riempiendosi completamente per farti capire dove ti trovi.</div>
  </div>

  <div class="buttons-menu">
    <button id="btn-talk" onclick="handleTalkClick()">PARLA</button>
    <button id="btn-rollout" onclick="handleRolloutClick()">ROLLOUT</button>
  </div>
</div>

<script>
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  const displayBox = document.getElementById('display-box');

  let recognition;
  let isListening = false;
  let isThinking = false; 
  
  let chatHistory = []; 
  let requestQueue = []; 

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isListening = true;
      updateStatusDisplay('ASCOLTO...');
    };

    recognition.onerror = () => resetStatus();
    recognition.onend = () => { isListening = false; };

    recognition.onresult = (event) => {
      const textSpoken = event.results[0][0].transcript;
      appendBubble('user', textSpoken);
      pushToQueue(textSpoken);
    };
  }

  function appendBubble(sender, text) {
    chatHistory.push({ sender: sender, text: text });
    
    const bubble = document.createElement('div');
    bubble.className = `bubble ${sender}`;
    bubble.innerHTML = sender === 'user' ? text : `<strong>IA:</strong> ${text}`;
    
    displayBox.appendChild(bubble);
    
    setTimeout(() => {
      displayBox.scrollTop = displayBox.scrollHeight;
    }, 50);

    resetStatus();
  }

  function pushToQueue(promptText) {
    requestQueue.push(promptText);
    
    if (!isThinking) {
      processNextQueueItem();
    } else {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    }
  }

  async function processNextQueueItem() {
    if (requestQueue.length === 0) {
      isThinking = false;
      resetStatus();
      return;
    }

    const nextPrompt = requestQueue.shift();
    
    if (nextPrompt === "__CANCELLED__") {
      setTimeout(processNextQueueItem, 50);
      return;
    }

    isThinking = true;
    updateStatusDisplay('ELABORAZIONE...');

    const apiMessages = [
      { 
        role: 'system', 
        content: 'Sei un assistente HUD per occhiali smart. Rispondi in italiano. Sii preciso al 100% sui dati storici e sportivi. Verifica sempre le informazioni usando la ricerca web attiva (es. Paolo Maldini ha giocato solo nel Milan!). Rispondi in massimo due frasi cortissime senza fronzoli. Rispondi SEMPRE e SOLO con testo semplice in italiano. Non restituire MAI codice JSON, reasoning o tool_calls.' 
      }
    ];
    
    const recent = chatHistory.slice(-4);
    recent.forEach(msg => {
      apiMessages.push({
        role: msg.sender === 'user' ? 'user' : 'assistant',
        content: msg.text
      });
    });

    try {
      const url = `https://text.pollinations.ai/${encodeURIComponent(nextPrompt)}?search=true&model=openai&system=${encodeURIComponent(apiMessages[0].content)}`;

      const response = await fetch(url, { method: 'GET' });

      if (!response.ok) throw new Error('Errore di risposta');

      let reply = await response.text();
      reply = reply.trim();
      
      if (reply.startsWith('{') || reply.includes('"reasoning"')) {
         try {
             const jsonObj = JSON.parse(reply);
             if (jsonObj.content && jsonObj.content !== "") {
                 reply = jsonObj.content;
             } else {
                 throw new Error("Solo log interno o reasoning rilevato");
             }
         } catch (e) {
             reply = "Sto verificando i dati, puoi ripetere?";
         }
      }

      appendBubble('ai', reply);
      
    } catch (error) {
      appendBubble('ai', 'Ricerca in corso troppo complessa. Ripeti in modo più semplice.');
    }

    setTimeout(processNextQueueItem, 500);
  }

  function removeLastUserRequest() {
    if (requestQueue.length > 0) {
      requestQueue.pop(); 
    } 
    
    const userBubbles = displayBox.querySelectorAll('.bubble.user');
    if (userBubbles.length > 0) {
      const lastUserBubble = userBubbles[userBubbles.length - 1];
      lastUserBubble.remove();
      
      for (let i = chatHistory.length - 1; i >= 0; i--) {
        if (chatHistory[i].sender === 'user') {
          chatHistory.splice(i, 1);
          break;
        }
      }
    }
    
    resetStatus();
  }

  function updateStatusDisplay(stateText) {
    if (stateText.includes('ASCOLTO')) statusBar.className = 'state-listening';
    else if (stateText.includes('ELABORAZIONE') || stateText.includes('CODA')) statusBar.className = 'state-thinking';
    else statusBar.className = 'state-ready';
    
    statusText.textContent = stateText;
  }

  function resetStatus() {
    if (requestQueue.length > 0) {
      updateStatusDisplay(`IN CODA [${requestQueue.length}]`);
    } else {
      updateStatusDisplay('PRONTO');
    }
  }

  function toggleListening() {
    if (!recognition) return;
    if (isListening) recognition.stop(); else recognition.start();
  }

  function handleTalkClick() {
    toggleListening();
  }

  function handleRolloutClick() {
    removeLastUserRequest();
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === 'Enter') { e.preventDefault(); toggleListening(); }
    if (e.key === 'ArrowDown') { displayBox.scrollBy({ top: 100, behavior: 'smooth' }); }
    if (e.key === 'ArrowUp') { displayBox.scrollBy({ top: -100, behavior: 'smooth' }); }
    if (e.key === 'Backspace' || e.key === 'Delete') { removeLastUserRequest(); }
  });
</script>
</body>
</html>
