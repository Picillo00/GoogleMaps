<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<title>HUD Live Dashboard</title>
<style>
  :root {
    --bg: #000;
    --text: #fff;
    --dim: #888;
    --accent: #00e5ff; /* Ciano brillante per HUD */
    --bitcoin: #f7931a;
    --weather: #ffcc00;
  }
  
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body, html {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    overflow: hidden; touch-action: none;
  }

  #wrap {
    display: flex; flex-direction: column; height: 100%; padding: 20px;
    justify-content: center; align-items: center; text-align: center;
  }

  #header {
    position: absolute; top: 15px; width: 100%; text-align: center;
    font-size: 12px; font-weight: bold; color: var(--dim); letter-spacing: 2px;
  }

  /* Contenitore della scheda dati */
  #data-card {
    background: rgba(20, 20, 20, 0.8);
    border: 1px solid #333;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    transition: all 0.3s ease;
  }

  .icon { font-size: 40px; margin-bottom: 10px; }
  .title { font-size: 14px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .value { font-size: 32px; font-weight: 800; margin: 5px 0; color: var(--text); }
  .subtitle { font-size: 14px; color: var(--accent); }

  /* Stati specifici */
  .type-crypto .value { color: var(--bitcoin); }
  .type-weather .value { color: var(--weather); }
  .type-quote .value { font-size: 20px; font-style: italic; color: #fff; }

  /* Controlli in basso */
  #controls {
    position: absolute; bottom: 15px; font-size: 11px; color: #555;
  }

  /* Animazione caricamento */
  .loading { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>
</head>
<body>

<div id="wrap">
  <div id="header">LIVE DATA HUB</div>

  <div id="data-card" class="loading">
    <div class="icon">📡</div>
    <div class="title">Connessione web...</div>
    <div class="value">Scaricando</div>
    <div class="subtitle">Attendere</div>
  </div>

  <div id="controls"><b>Pinch:</b> Scorri • <b>Doppio:</b> Aggiorna dati</div>
</div>

<script>
(() => {
  // Qui salveremo i dati scaricati dal web
  let dashboardData = [];
  let currentIndex = 0;
  
  const cardEl = document.getElementById('data-card');

  // 1. Funzione per scaricare il prezzo del Bitcoin
  async function fetchCrypto() {
    try {
      const res = await fetch('https://api.coindesk.com/v1/bpi/currentprice/EUR.json');
      const data = await res.json();
      return {
        type: 'crypto',
        icon: '₿',
        title: 'Bitcoin (BTC)',
        value: '€' + Math.round(data.bpi.EUR.rate_float).toLocaleString('it-IT'),
        subtitle: 'Ultimo aggiornamento live'
      };
    } catch(e) { return null; }
  }

  // 2. Funzione per scaricare il Meteo (Impostato su coordinate generiche, es. Napoli/Roma)
  async function fetchWeather() {
    try {
      // Coordinate di Napoli: lat=40.85, lon=14.26
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=40.85&longitude=14.26&current_weather=true');
      const data = await res.json();
      const temp = Math.round(data.current_weather.temperature);
      return {
        type: 'weather',
        icon: temp > 20 ? '☀️' : '☁️',
        title: 'Meteo Attuale',
        value: temp + ' °C',
        subtitle: 'Vento: ' + data.current_weather.windspeed + ' km/h'
      };
    } catch(e) { return null; }
  }

  // 3. Funzione per scaricare una frase del giorno
  async function fetchQuote() {
    try {
      const res = await fetch('https://dummyjson.com/quotes/random');
      const data = await res.json();
      return {
        type: 'quote',
        icon: '💬',
        title: 'Frase del giorno',
        value: `"${data.quote}"`,
        subtitle: '- ' + data.author
      };
    } catch(e) { return null; }
  }

  // Motore principale: Scarica tutto in parallelo
  async function loadAllData() {
    cardEl.className = 'loading';
    cardEl.innerHTML = `<div class="icon">⏳</div><div class="title">Sincronizzazione API</div><div class="value">Attendere...</div>`;
    
    // Esegue le tre chiamate web contemporaneamente
    const results = await Promise.all([fetchCrypto(), fetchWeather(), fetchQuote()]);
    
    // Filtra eventuali errori (se un'API va offline)
    dashboardData = results.filter(item => item !== null);
    
    if (dashboardData.length > 0) {
      currentIndex = 0;
      renderCard();
    } else {
      cardEl.innerHTML = `<div class="title">Errore di rete</div><div class="value">Offline</div>`;
    }
  }

  // Mostra i dati a schermo
  function renderCard() {
    if (dashboardData.length === 0) return;
    const item = dashboardData[currentIndex];
    
    // Effetto dissolvenza
    cardEl.style.opacity = 0;
    setTimeout(() => {
      cardEl.className = 'type-' + item.type;
      cardEl.innerHTML = `
        <div class="icon">${item.icon}</div>
        <div class="title">${item.title}</div>
        <div class="value">${item.value}</div>
        <div class="subtitle">${item.subtitle}</div>
      `;
      cardEl.style.opacity = 1;
    }, 200);
  }

  // --- AZIONI DEL BRACCIALE NEURAL-BAND ---
  
  function nextSlide() {
    if (dashboardData.length === 0) return;
    currentIndex = (currentIndex + 1) % dashboardData.length;
    renderCard();
  }

  let lastClickTime = 0;

  function handlePointerUp(e) {
    const now = Date.now();
    if (now - lastClickTime < 300) {
      // Doppio Pinch: Forza un nuovo download dei dati dal web
      lastClickTime = 0;
      loadAllData();
      if(e) e.preventDefault();
      return;
    }
    
    lastClickTime = now;
    setTimeout(() => {
      if (lastClickTime !== now) return; 
      lastClickTime = 0;
      // Pinch Singolo: Scorri alla prossima scheda
      nextSlide(); 
    }, 300);
  }

  document.addEventListener('pointerup', handlePointerUp);

  // Fallback per tastiera
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); nextSlide(); }
    if (e.key === 'r' || e.key === 'R') { loadAllData(); } // Simula il doppio pinch
  });

  // Avvia il download dei dati appena apri la pagina
  loadAllData();

})();
</script>
</body>
</html>
