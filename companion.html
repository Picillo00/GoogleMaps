<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Companion iPhone (P2P)</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  body { background: #020205; color: #00ffaa; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  .setup-box { width: 100%; max-width: 400px; background: #0a0a14; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1a1a26; }
  input { width: 100%; padding: 12px; font-size: 16px; background: #000; border: 1px solid #00ffaa; color: #fff; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-weight: bold; }
  button { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; background: rgba(0,255,170,0.1); border: 2px solid #00ffaa; color: #00ffaa; border-radius: 12px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0, 255, 170, 0.2); }
  #log { width: 100%; max-width: 400px; height: 300px; background: #05050a; padding: 15px; font-family: monospace; font-size: 14px; overflow-y: auto; border-radius: 12px; border: 1px solid #1a1a26; }
  .msg { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
</style>
</head>
<body>

  <div class="setup-box">
    <label style="display:block; margin-bottom: 10px; font-size: 14px; color: #aaa; text-align: center;">Parola Segreta per gli occhiali:</label>
    <input type="text" id="roomInput" placeholder="Es. picillo-rayban" />
    <button id="connectBtn">1. Crea Stanza</button>
    <button id="unlockBtn" style="display:none; border-color: #f4b400; color: #f4b400; background: rgba(244,180,0,0.1);">2. Sblocca Microfono iOS</button>
  </div>

  <div id="log"><div class="msg">> Inserisci una parola inventata per avviare...</div></div>

<script>
  const logDiv = document.getElementById('log');
  const roomInput = document.getElementById('roomInput');
  const connectBtn = document.getElementById('connectBtn');
  const unlockBtn = document.getElementById('unlockBtn');
  
  let peer;
  let activeConnection;
  let recognition;

  if(localStorage.getItem('savedRoom')) {
    roomInput.value = localStorage.getItem('savedRoom');
  }

  function log(msg) { logDiv.innerHTML += `<div class="msg">> ${msg}</div>`; logDiv.scrollTop = logDiv.scrollHeight; }

  // Inizializza il microfono
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.continuous = false;
    
    recognition.onstart = () => log("🔴 In ascolto...");
    
    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      log("🟢 Testo: " + text);
      if(activeConnection && activeConnection.open) activeConnection.send({ type: 'transcript', text: text });
    };
    recognition.onerror = (e) => {
      log("Errore Mic: " + e.error);
      if(activeConnection && activeConnection.open) activeConnection.send({ type: 'error', error: e.error });
    };
  } else {
    log("ERRORE: Browser non supportato per la voce.");
  }

  connectBtn.addEventListener('click', () => {
    const room = roomInput.value.trim();
    if(!room) return alert("Inserisci una parola segreta");
    localStorage.setItem('savedRoom', room);
    
    const myId = 'iphone-' + room;
    log("Creazione stanza P2P: " + room + " ...");
    
    peer = new Peer(myId);
    
    peer.on('open', (id) => {
      log("✅ Stanza aperta. In attesa degli occhiali...");
      connectBtn.style.display = 'none';
      roomInput.style.display = 'none';
      unlockBtn.style.display = 'block';
    });

    peer.on('connection', (conn) => {
      activeConnection = conn;
      log("✅ Occhiali connessi con successo!");
      
      conn.on('data', (data) => {
        if (data.type === 'start_listening') {
          log("📲 Richiesta dagli occhiali: Avvio microfono...");
          try { recognition.start(); } catch(e) { log("Errore avvio mic."); }
        }
      });
    });
    
    peer.on('error', (err) => log("❌ Errore PeerJS: " + err.type));
  });

  unlockBtn.addEventListener('click', () => {
    try {
      recognition.start();
      setTimeout(() => recognition.stop(), 500); 
      log("✅ Microfono sbloccato. Indossa gli occhiali.");
      unlockBtn.style.display = 'none';
    } catch(e) { log("Errore microfono."); }
  });
</script>
</body>
</html>
